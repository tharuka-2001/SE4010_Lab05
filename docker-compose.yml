version: '3.8'

services:
  item-service:
    build: ./item-service
    ports:
      - "8081:8081"

  order-service:
    build: ./order-service
    ports:
      - "8082:8082"

  payment-service:
    build: ./payment-service
    ports:
      - "8083:8083"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8090:8090"
    depends_on:
      - item-service
      - order-service
      - payment-service